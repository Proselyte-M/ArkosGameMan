[app]
rom_root = G:\备份\game

[update]
repository = Proselyte-M/ArkosGameMan
check_on_start = true

[emulator_profile:fc]
folders = famicom,fds,nes
emulator_path = 
launch_command = {emulator} "{rom}"
install_script = 
use_external = false
use_bundled = true
bundled_core_dll = quicknes_libretro.dll
bundled_emulator_path = 
key_profile = default
key_bindings = 
display_profile = pixel
video_scaling = fit
video_filter = nearest
audio_latency_ms = 80
frame_sync = precise

[emulator_profile:snes]
folders = snes,sfc
emulator_path = 
launch_command = {emulator} "{rom}"
install_script = 
use_external = false
use_bundled = true
