name: Build Windows EXE & Create Release

on:
  push:
    branches: [main, master]  # 推送代码到主分支触发
  workflow_dispatch:  # 支持手动触发

jobs:
  build-exe:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write  # 必须：打标签/创建 Release 权限
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整仓库历史，允许打标签

      # 新增：从根目录 version.py 提取版本号（适配目录结构）
      - name: Extract version from version.py (root)
        id: extract_version
        run: |
          # 确认 version.py 在根目录（Actions 中仓库根目录是默认工作目录）
          if (-not (Test-Path "version.py")) {
            Write-Error "根目录未找到 version.py 文件"
            exit 1
          }
          # 读取并提取 APP_VERSION
          $content = Get-Content -Path "version.py" -Raw
          $match = [regex]::Match($content, 'APP_VERSION\s*=\s*["\']([0-9.]+)["\']')
          if (-not $match.Success) {
            Write-Error "version.py 中未找到 APP_VERSION 定义"
            exit 1
          }
          $VERSION = $match.Groups[1].Value.Trim()
          $TAG_NAME = "v$VERSION"
          
          # 输出到环境变量供后续步骤使用
          echo "version=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          echo "tag_name=$TAG_NAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          
          Write-Host "✅ 从根目录 version.py 提取到版本号：$VERSION，标签名：$TAG_NAME"
        shell: pwsh

      # 新增：自动创建并推送 Git 标签（已适配根目录）
      - name: Create and push Git tag
        run: |
          # 检查标签是否已存在
          $TAG_EXISTS = git tag -l $env:TAG_NAME
          if ($TAG_EXISTS) {
            Write-Host "⚠️  标签 $env:TAG_NAME 已存在，跳过创建"
          } else {
            # 创建标签
            git tag -a $env:TAG_NAME -m "Release $env:TAG_NAME"
            # 推送标签到远程
            git push origin $env:TAG_NAME
            Write-Host "✅ 成功创建并推送标签：$env:TAG_NAME"
          }
        env:
          TAG_NAME: ${{ steps.extract_version.outputs.tag_name }}
        shell: pwsh

      # 以下步骤无需修改（和之前一致）
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow PySide6 qtawesome ruff mypy --verbose
        shell: pwsh

      - name: Create necessary directories
        run: |
          if (-not (Test-Path "build")) { New-Item -ItemType Directory -Path "build" | Out-Null }
          if (-not (Test-Path "scripts")) { New-Item -ItemType Directory -Path "scripts" | Out-Null }
        shell: pwsh

      - name: Prepare application icon
        run: |
          python scripts/prepare_icon.py --source logo.png --output build
        shell: pwsh
        continue-on-error: true

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --noconfirm --clean --windowed --onefile `
            --name ArkosGameMan `
            --icon build/app_icon.ico `
            --add-data "styles;styles" --add-data "logo.png;." `
            app.py
        shell: pwsh

      - name: Verify EXE file exists
        run: |
          if (-not (Test-Path "dist/ArkosGameMan.exe")) {
            Write-Error "打包失败：未找到 dist/ArkosGameMan.exe"
            exit 1
          }
        shell: pwsh

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArkosGameMan-windows-exe-${{ steps.extract_version.outputs.tag_name }}
          path: dist/ArkosGameMan.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ArkosGameMan ${{ steps.extract_version.outputs.tag_name }}
          tag_name: ${{ steps.extract_version.outputs.tag_name }}  # 使用提取的标签名
          body: |
            ## ArkosGameMan ${{ steps.extract_version.outputs.tag_name }} 发布
            - 自动构建的 Windows 可执行文件
            - 版本号：${{ steps.extract_version.outputs.version }}
            - 构建提交：${{ github.sha }}
          files: ./dist/ArkosGameMan.exe
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}