name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow PySide6 qtawesome

      - name: Prepare icon
        run: python scripts/prepare_icon.py --source logo.png --output build

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name ArkosGameMan --icon build/app_icon.ico --add-data "styles;styles" --add-data "logo.png;." app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArkosGameMan-windows-exe
          path: dist/ArkosGameMan.exe
          if-no-files-found: error
